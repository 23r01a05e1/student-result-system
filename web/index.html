<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Result System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo h1 { font-size: 24px; color: #0f3460; font-weight: 700; }
    .logo p { color: #888; font-size: 14px; margin-top: 5px; }
    .role-selector {
      display: flex;
      margin-bottom: 25px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #e0e0e0;
    }
    .role-btn {
      flex: 1; padding: 12px; border: none; cursor: pointer;
      font-size: 14px; font-weight: 500; background: #f5f5f5;
      color: #888; transition: all 0.3s;
    }
    .role-btn.active { background: #0f3460; color: white; }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 13px; color: #555;
      margin-bottom: 6px; font-weight: 500;
    }
    .form-group input {
      width: 100%; padding: 12px 15px; border: 1px solid #e0e0e0;
      border-radius: 8px; font-size: 14px; outline: none; transition: border 0.3s;
    }
    .form-group input:focus { border-color: #0f3460; }
    .login-btn {
      width: 100%; padding: 13px; background: #0f3460; color: white;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.3s; margin-top: 5px;
    }
    .login-btn:hover { background: #e94560; }
    .message { text-align: center; margin-top: 15px; font-size: 13px; color: #e94560; }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>🎓 Student Result System</h1>
    <p>Manage and view academic results</p>
  </div>
  <div class="role-selector">
    <button class="role-btn active" onclick="setRole('admin')">Admin</button>
    <button class="role-btn" onclick="setRole('student')">Student</button>
  </div>
  <div id="admin-form">
    <div class="form-group">
      <label>Admin Password</label>
      <input type="password" id="admin-pass" placeholder="Enter admin password" />
    </div>
    <button class="login-btn" onclick="adminLogin()">Login as Admin</button>
  </div>
  <div id="student-form" style="display:none;">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="student-email" placeholder="Enter your email" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="student-pass" placeholder="Enter your password" />
    </div>
    <button class="login-btn" onclick="studentLogin()">Login as Student</button>
  </div>
  <div class="message" id="message"></div>
</div>
<script>
  function setRole(role) {
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    if (role === 'admin') {
      document.getElementById('admin-form').style.display = 'block';
      document.getElementById('student-form').style.display = 'none';
    } else {
      document.getElementById('admin-form').style.display = 'none';
      document.getElementById('student-form').style.display = 'block';
    }
    document.getElementById('message').textContent = '';
  }

  function adminLogin() {
    const pass = document.getElementById('admin-pass').value;
    if (!pass) {
      document.getElementById('message').textContent = 'Please enter admin password!';
      return;
    }
    if (pass === 'admin123') {
      window.location.href = 'admin.html';
    } else {
      document.getElementById('message').textContent = 'Wrong password!';
    }
  }

  function studentLogin() {
    const email = document.getElementById('student-email').value;
    const pass = document.getElementById('student-pass').value;
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!email || !pass) {
      document.getElementById('message').textContent = 'Please fill all fields!';
      return;
    }
    if (!emailRegex.test(email)) {
      document.getElementById('message').textContent = 'Please enter a valid email!';
      return;
    }
    const students = JSON.parse(localStorage.getItem('students') || '[]');
    const student = students.find(s => s.email === email && s.pass === pass);
    if (!student) {
      document.getElementById('message').textContent = 'Invalid email or password!';
      return;
    }
    localStorage.setItem('studentEmail', email);
    localStorage.setItem('studentPass', pass);
    window.location.href = 'student.html';
  }
</script>
</body>
</html>
